<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
     <defs>
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="800" height="300" rx="24" ry="24" />
    </clipPath>
  </defs>

    <image href="https://i.pinimg.com/1200x/3e/8f/da/3e8fda5442054fa05518de543da08fbb.jpg" x="0" y="0" width="800" height="300" preserveAspectRatio="xMidYMid slice" 
         clip-path="url(#roundedClip)" />

    <rect width="100%" height="100%" rx="24" fill="rgba(15,23,42,0.02)" />
  <text id="label" x="400" y="100" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="64"
        font-weight="600"
        fill="#f8fafc">Chicago • CDT</text>

  <text id="time" x="400" y="250" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="140"
        font-weight="700"
        fill="#f8fafc">--:--:--</text>

  <script><![CDATA[
    const label = document.getElementById("label");
    const time = document.getElementById("time");

    function updateClock() {
      const now = new Date();

      const timeFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        hour: "numeric",
        minute: "2-digit",
    
        hour12: true
      });

      const zoneFormatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        timeZoneName: "short"
      });

      const parts = zoneFormatter.formatToParts(now);
      let tzName = "CDT";
      for (const part of parts) {
        if (part.type === "timeZoneName") {
          tzName = part.value;
          break;
        }
      }

      time.textContent = timeFormatter.format(now);
      label.textContent = "Chicago • " + tzName;
    }

    updateClock();
    setInterval(updateClock, 1000);
  ]]></script>
</svg>
